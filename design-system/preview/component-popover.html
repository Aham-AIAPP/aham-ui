<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popover — Aham UI Preview</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    /* ---- Popover 组件样式 ---- */
    .popover-wrapper {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* 触发器示意 */
    .popover-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      padding: 0 16px;
      border: 1px solid var(--ui-border);
      border-radius: var(--radius-md);
      background: var(--ui-panel);
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--ink-primary);
      cursor: default;
      user-select: none;
      white-space: nowrap;
    }

    /* Popover Panel */
    .popover {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      min-width: 200px;
      max-width: 360px;
      padding: 8px;
      background: #FFFFFF;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(20,20,20,0.06);
    }

    /* Arrow: 8px triangle using border trick */
    .popover-arrow,
    .popover-arrow::before {
      position: absolute;
      width: 8px;
      height: 8px;
      background: inherit;
    }

    .popover-arrow {
      visibility: hidden;
    }

    .popover-arrow::before {
      visibility: visible;
      content: '';
      transform: rotate(45deg);
    }

    /* Arrow placements */
    .popover[data-placement="bottom"] .popover-arrow {
      top: -4px;
      left: 50%;
      margin-left: -4px;
    }

    .popover[data-placement="top"] .popover-arrow {
      bottom: -4px;
      left: 50%;
      margin-left: -4px;
    }

    /* Popover content items */
    .popover-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* 信息面板内容 */
    .popover-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 4px;
    }

    .popover-info-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .popover-info-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .popover-info-dot.is-green  { background: var(--accent-green); }
    .popover-info-dot.is-gray   { background: var(--ink-tertiary); }

    .popover-info-label {
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-secondary);
      min-width: 52px;
    }

    .popover-info-value {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--ink-primary);
    }

    .popover-info-desc {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--ink-secondary);
      line-height: 1.5;
    }

    /* 分隔线 */
    .popover-divider {
      height: 1px;
      background: var(--ui-border);
      margin: 4px 0;
    }

    /* 上下文菜单项 */
    .popover-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--ink-primary);
      cursor: default;
      user-select: none;
      transition: background 0.1s;
    }

    .popover-item:hover {
      background: var(--ui-panel);
    }

    .popover-item.is-disabled {
      color: var(--ink-disabled);
      cursor: default;
    }

    .popover-item.is-disabled:hover {
      background: transparent;
    }

    .popover-item-icon {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--ink-tertiary);
    }

    .popover-item-icon svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .popover-item-label {
      flex: 1;
    }

    .popover-item-shortcut {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--ink-tertiary);
    }

    .popover-item-hint {
      font-family: var(--font-sans);
      font-size: 12px;
      color: var(--ink-tertiary);
    }

    /* 设置内容片段 */
    .popover-settings {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px;
    }

    .popover-setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 0;
    }

    .popover-setting-label {
      font-family: var(--font-sans);
      font-size: 13px;
      color: var(--ink-primary);
    }

    /* 简单 toggle 示意 */
    .popover-toggle {
      width: 28px;
      height: 16px;
      border-radius: 8px;
      background: var(--ui-border);
      position: relative;
      cursor: default;
      flex-shrink: 0;
    }

    .popover-toggle.is-on {
      background: var(--ink-primary);
    }

    .popover-toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #FFFFFF;
      transition: transform 0.15s;
    }

    .popover-toggle.is-on::after {
      transform: translateX(12px);
    }

    /* ---- 页面布局 ---- */
    body { margin: 0; background: var(--color-bg-app); font-family: var(--font-sans); color: var(--color-ink-primary); display: flex; justify-content: center; padding: var(--space-6, 24px); }
    .specimen { width: 100%; max-width: 960px; display: flex; flex-direction: column; gap: var(--space-6, 24px); }
    .header { padding-bottom: var(--space-2, 8px); }
    .header h2 { margin: 0; font-family: var(--font-display); font-size: var(--aham-typography-fontSize-lg, 18px); font-weight: var(--aham-typography-fontWeight-semibold, 600); color: var(--color-ink-primary); }
    .stage { display: flex; flex-direction: column; gap: var(--space-5, 20px); }
    .story { display: flex; flex-direction: column; gap: var(--space-3, 12px); }
    .story-label { font-size: var(--aham-typography-fontSize-xs, 12px); font-weight: var(--aham-typography-fontWeight-medium, 500); color: var(--color-ink-tertiary); text-transform: uppercase; letter-spacing: 0.5px; padding: var(--space-1, 4px) 0; }
    .rail { display: flex; gap: var(--space-3, 12px); flex-wrap: wrap; align-items: flex-start; }
    .divider { border: none; border-top: 1px solid var(--color-border, #E5E7EB); margin: var(--space-1, 4px) 0; }
    .popover-demo-area { display: flex; gap: 64px; flex-wrap: wrap; align-items: flex-start; }
    .popover-demo-group { display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .popover-label { font-family: var(--font-sans); font-size: 12px; color: var(--ink-tertiary); text-align: center; }
    .popover-spacer { height: 40px; }
  </style>
</head>
<body>
<div class="specimen">
<div class="header"><h2>Popover</h2></div>
<div class="stage">

<div class="story">
<span class="story-label">默认信息面板 · Bottom</span>
<div class="rail">

        <span class="popover-trigger">触发器</span>

              <div class="popover-info-row"><span class="popover-info-dot is-gray"></span><span class="popover-info-label">延迟</span><span class="popover-info-value">12 ms</span></div>
              <div class="popover-info-desc" style="margin-top:4px;">最后一次同步于 3 分钟前，数据通路正常。</div>
            </div>
          </div>
        </div>
        <span class="popover-label">Bottom · 带箭头（默认）</span>
      </div>
    </div>
  </div>
</div>
</div>

<hr class="divider">

          </div>
        </div>
        <span class="popover-trigger">触发器</span>
        <span class="popover-label">Top · 箭头朝下</span>

    </div>
    <div class="popover-demo-group">
      <div class="popover-wrapper">
        <span class="popover-trigger">触发器</span>

</html>
