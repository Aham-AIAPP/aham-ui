<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider · Aham UI</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    /* ============================================================
       Preview Page Layout
       ============================================================ */
    body {
      margin: 0;
      background: var(--color-bg-app);
      font-family: var(--font-sans, 'Inter', system-ui, sans-serif);
      color: var(--color-ink-primary, #262626);
      display: flex;
      justify-content: center;
      padding: var(--space-6, 24px);
    }

    .specimen { width: 100%; max-width: 960px; display: flex; flex-direction: column; gap: var(--space-6, 24px); }
    .header { padding-bottom: var(--space-2, 8px); }
    .header h2 { margin: 0; font-family: var(--font-display, 'Inter Display', sans-serif); font-size: var(--aham-typography-fontSize-lg, 18px); font-weight: var(--aham-typography-fontWeight-semibold, 600); color: var(--color-ink-primary); }
    .stage { display: flex; flex-direction: column; gap: var(--space-5, 20px); }
    .story { display: flex; flex-direction: column; gap: var(--space-3, 12px); }
    .story-label { font-size: var(--aham-typography-fontSize-xs, 12px); font-weight: var(--aham-typography-fontWeight-medium, 500); color: var(--color-ink-tertiary); text-transform: uppercase; letter-spacing: 0.5px; padding: var(--space-1, 4px) 0; }
    .rail { display: flex; gap: var(--space-3, 12px); flex-wrap: wrap; align-items: flex-start; }
    .divider { border: none; border-top: 1px solid var(--color-border, #E5E7EB); margin: var(--space-1, 4px) 0; }

    /* ============================================================
       Slider Component
       ============================================================ */
    .slider-row {
      position: relative;
      padding-top: 28px;
      margin-bottom: var(--aham-spacing-5, 24px);
    }

    .slider-row:last-child {
      margin-bottom: 0;
    }

    .slider-value {
      position: absolute;
      top: 2px;
      left: 0;
      transform: translateX(-50%);
      font-size: var(--aham-typography-fontSize-xs, 12px);
      font-weight: 500;
      line-height: 1.4;
      color: var(--color-ink-tertiary, #9B9B9B);
      white-space: nowrap;
      pointer-events: none;
    }

    .slider {
      position: relative;
      height: 26px;
      cursor: pointer;
    }

    /* Track background */
    .slider-track {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--color-surface-line, #E7E7E7);
      border-radius: var(--aham-radius-pill, 999px);
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* Track fill (accent blue before knob) */
    .slider-fill {
      position: absolute;
      top: 50%;
      left: 0;
      height: 4px;
      background: var(--color-accent, #336EE8);
      border-radius: var(--aham-radius-pill, 999px) 0 0 var(--aham-radius-pill, 999px);
      transform: translateY(-50%);
      pointer-events: none;
    }

    /* Knob */
    .slider-knob {
      position: absolute;
      top: 50%;
      width: 16px;
      height: 16px;
      background: var(--color-surface, #FFFFFF);
      border: 1.5px solid var(--color-surface-line, #E7E7E7);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: none;
      transition: background var(--aham-motion-duration-fast, 0.12s) var(--aham-motion-easing-standard, cubic-bezier(.2,0,0,1));
    }

    /* ============================================================
       Active State
       ============================================================ */
    .slider-row.active .slider-knob {
      background: var(--color-surface-panel, #F3F3F3);
    }

    .slider-row.active .slider-fill {
      background: var(--color-accent, #336EE8);
    }

    /* ============================================================
       Disabled State
       ============================================================ */
    .slider-row.disabled {
      opacity: var(--aham-opacity-disabled, 0.4);
      cursor: not-allowed;
      pointer-events: none;
    }

    .slider-row.disabled .slider-fill {
      background: var(--color-surface-line, #E7E7E7);
    }

    .slider-row.disabled .slider-knob {
      background: var(--color-surface-line, #E7E7E7);
      border-color: var(--color-ink-quaternary, #C4C4C4);
    }

    /* ============================================================
       Divider
       ============================================================ */
    .state-badge {
      display: inline-block;
      font-size: var(--aham-typography-fontSize-xs, 12px);
      font-weight: 500;
      color: var(--color-ink-tertiary, #9B9B9B);
      margin-bottom: var(--aham-spacing-4, 16px);
    }
  </style>
</head>
<body>
<div class="specimen">
<div class="header"><h2>Slider</h2></div>
<div class="stage">

<div class="story">
<span class="story-label">Default</span>
<div class="rail">
  <div class="slider-row"><span class="slider-value" style="left:25%">25%</span><div class="slider"><div class="slider-track"></div><div class="slider-fill" style="width:25%"></div><div class="slider-knob" style="left:25%"></div></div></div>
  <div class="slider-row"><span class="slider-value" style="left:50%">50%</span><div class="slider"><div class="slider-track"></div><div class="slider-fill" style="width:50%"></div><div class="slider-knob" style="left:50%"></div></div></div>
  <div class="slider-row"><span class="slider-value" style="left:75%">75%</span><div class="slider"><div class="slider-track"></div><div class="slider-fill" style="width:75%"></div><div class="slider-knob" style="left:75%"></div></div></div>
</div>
</div>

<hr class="divider">

<div class="story">
<span class="story-label">Active</span>
<div class="rail">
  <div class="slider-row active"><span class="slider-value" style="left:60%">60%</span><div class="slider"><div class="slider-track"></div><div class="slider-fill" style="width:60%"></div><div class="slider-knob" style="left:60%"></div></div></div>
</div>
</div>

<hr class="divider">

<div class="story">
<span class="story-label">Disabled</span>
<div class="rail">
  <div class="slider-row disabled"><span class="slider-value" style="left:40%">40%</span><div class="slider"><div class="slider-track"></div><div class="slider-fill" style="width:40%"></div><div class="slider-knob" style="left:40%"></div></div></div>
</div>
</div>

</div>
</div>
</body>
</html>
